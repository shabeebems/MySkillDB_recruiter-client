name: Deploy to Firebase (Production)

on:
  push:
    branches:
      - Production

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: npm install
      - run: npm run build

      - run: npm install -g firebase-tools

      - name: Deploy
        run: firebase deploy --only hosting --project my-skilldb-rec --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}